<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visor de Reloj 3D - Tarea 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="./style/index.css">
  </head>
  <body class="bg-light p-4">
    <div class="container">
        <div class="card shadow border-0 rounded-lg mx-auto" style="max-width: 800px;">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0 fw-bold">Visor Animado de Reloj 3D</h4>
            </div>
            
            <div class="card-body text-center p-4">
                <!-- Controles simplificados y modernos -->
                <div class="d-flex justify-content-center align-items-center gap-3 mb-4 flex-wrap">
                    <label for="fileInput" class="btn btn-outline-primary fw-bold m-0 shadow-sm">
                        📁 Cargar TXT del Reloj
                        <input type="file" id="fileInput" accept=".txt" style="display: none;">
                    </label>
                    <button class="btn btn-success fw-bold shadow-sm" type="button" id="btnRotar">
                        ⏱️ Mover Manecillas
                    </button>
                </div>

                <!-- Contenedor del Canvas -->
                <div class="chart border rounded bg-white p-2 mb-3 shadow-sm d-inline-block">
                    <canvas id="circlechart" width="640" height="480" class="img-fluid"></canvas>
                </div>

                <p class="text-muted small mb-0">Sube tu archivo estructurado para visualizar el reloj y presiona el botón para animar sus piezas.</p>
            </div>
            
            <div class="card-footer bg-white text-muted text-center py-3">
                <small>Entrega: Tarea 3</small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="./dist/src/index.js" type="module"></script>
  </body>
</html>
